<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مؤرشف صفحات جوجل الفوري</title>
  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px;
      max-width: 650px;
      width: 100%;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
    }
    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      color: #38bdf8;
      text-align: center;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      text-align: center;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #cbd5e1;
    }
    textarea {
      width: 100%;
      background-color: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #f8fafc;
      padding: 12px;
      font-size: 14px;
      box-sizing: border-box;
      height: 150px;
      resize: vertical;
      font-family: monospace;
    }
    button {
      background: linear-gradient(135deg, #38bdf8, #0284c7);
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
      margin-top: 10px;
    }
    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .status-container {
      margin-top: 30px;
      border-top: 1px solid #334155;
      padding-top: 20px;
    }
    .status-list {
      max-height: 250px;
      overflow-y: auto;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 12px;
      background: #0f172a;
      margin-top: 10px;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 4px;
      border-bottom: 1px solid #1e293b;
      font-size: 13px;
    }
    .status-item:last-child {
      border-bottom: none;
    }
    .success { color: #4ade80; font-weight: bold; }
    .failed { color: #f87171; font-weight: bold; }
    .pending { color: #fbbf24; }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚡ مؤرشف جوجل الفوري لـ DevTools Hub</h1>
    <div class="subtitle">
      سجل الدخول باستخدام حساب جوجل الخاص بك ليتم أرشفة صفحات موقعك بالكامل تلقائياً وبأمان من المتصفح مباشرة.
    </div>

    <div class="form-group" id="url-group" style="display: none;">
      <label for="urls">الروابط المراد أرشفتها:</label>
      <textarea id="urls" placeholder="جاري تحميل الروابط من Sitemap تلقائياً..." required></textarea>
    </div>

    <button id="auth-btn">🔑 تسجيل الدخول وجلب الصلاحية من جوجل</button>
    <button id="start-btn" style="display: none;">🚀 ابدأ الأرشفة الفورية الآن</button>

    <div id="status-card" class="status-container" style="display: none;">
      <h3 style="margin: 0 0 10px 0; font-size: 16px; color: #cbd5e1;">نتائج الأرشفة:</h3>
      <div id="status-list" class="status-list"></div>
    </div>
  </div>

  <script>
    const CLIENT_ID = '1003576798943-42o448mpd1t9gqrd5pjp5f1ojl6teqqn.apps.googleusercontent.com';
    const REDIRECT_URI = 'http://localhost:5173/instant-index.html';
    
    // Parse URL hash for access token
    const params = new URLSearchParams(window.location.hash.substring(1));
    const accessToken = params.get('access_token');
    
    const authBtn = document.getElementById('auth-btn');
    const startBtn = document.getElementById('start-btn');
    const urlGroup = document.getElementById('url-group');

    authBtn.addEventListener('click', () => {
      const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=https://www.googleapis.com/auth/indexing`;
      window.location.href = authUrl;
    });

    // Automatically load URLs from sitemap
    fetch('/sitemap.xml')
      .then(res => res.text())
      .then(xmlText => {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
        const locs = xmlDoc.getElementsByTagName('loc');
        const urls = [];
        for (let i = 0; i < locs.length; i++) {
          urls.push(locs[i].textContent);
        }
        document.getElementById('urls').value = urls.join('\n');
      })
      .catch(err => {
        console.error('Failed to load sitemap.xml automatically:', err);
      });

    if (accessToken) {
      authBtn.style.display = 'none';
      startBtn.style.display = 'block';
      urlGroup.style.display = 'block';

      // Clear the hash so the token isn't visible in the URL
      window.history.replaceState(null, null, window.location.pathname);

      startBtn.addEventListener('click', async () => {
        const urlsText = document.getElementById('urls').value.trim();
        if (!urlsText) {
          alert('يرجى إضافة رابط واحد على الأقل!');
          return;
        }

        const urls = urlsText.split('\n').map(u => u.trim()).filter(u => u.length > 0);
        const statusCard = document.getElementById('status-card');
        const statusList = document.getElementById('status-list');

        statusCard.style.display = 'block';
        statusList.innerHTML = '';
        startBtn.disabled = true;
        startBtn.textContent = '⏳ جاري الأرشفة...';

        for (const url of urls) {
          const item = document.createElement('div');
          item.className = 'status-item';
          item.innerHTML = `<span>${url}</span><span class="pending">جاري الإرسال...</span>`;
          statusList.appendChild(item);
          statusList.scrollTop = statusList.scrollHeight;

          try {
            const res = await fetch('https://indexing.googleapis.com/v3/urlNotifications:publish', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${accessToken}`
              },
              body: JSON.stringify({
                url: url,
                type: 'URL_UPDATED'
              })
            });

            if (res.ok) {
              item.querySelector('span:last-child').className = 'success';
              item.querySelector('span:last-child').textContent = '✅ تم بنجاح';
            } else {
              const errData = await res.json();
              item.querySelector('span:last-child').className = 'failed';
              item.querySelector('span:last-child').textContent = `❌ فشل: ${errData.error.message}`;
            }
          } catch (err) {
            item.querySelector('span:last-child').className = 'failed';
            item.querySelector('span:last-child').textContent = `❌ فشل اتصال الشبكة`;
          }
          await new Promise(r => setTimeout(r, 300));
        }

        startBtn.disabled = false;
        startBtn.textContent = '🚀 ابدأ الأرشفة الفورية الآن';
      });
    }
  </script>
</body>
</html>
